<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="View and manage your hotel bookings on BookMyRoom. Track check-in dates, booking status, and more.">
  <title>My Bookings — BookMyRoom</title>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/favicon-192.png">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@500;600;700&display=swap" media="print" onload="this.media='all'">
  <link rel="preload" href="css/tailwind.css?v=3" as="style">
  <link rel="stylesheet" href="css/tailwind.css?v=3">
  <style>
    /* My Bookings Page Styles */
    .bookings-header {
      padding: 100px 24px 40px;
      background: var(--bg-white);
    }
    .bookings-header-inner {
      max-width: 1200px; margin: 0 auto;
      display: flex; align-items: flex-end; justify-content: space-between;
      flex-wrap: wrap; gap: 16px;
    }
    .greeting h1 {
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 800; letter-spacing: -0.02em;
      margin-bottom: 4px;
    }
    .greeting p {
      color: var(--text-muted); font-size: 0.92rem;
    }

    /* Stats strip */
    .booking-stats {
      display: flex; gap: 20px; flex-wrap: wrap;
    }
    .booking-stat {
      text-align: center; padding: 12px 20px;
      background: var(--bg-light); border-radius: 12px;
      min-width: 90px;
    }
    .booking-stat .num {
      font-family: var(--font-heading);
      font-size: 1.5rem; font-weight: 800;
      color: var(--text-dark); letter-spacing: -0.02em;
    }
    .booking-stat .lbl {
      font-size: 0.72rem; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 1px;
      font-weight: 600; margin-top: 2px;
    }

    /* Filter tabs */
    .filter-tabs {
      display: flex; gap: 6px; padding: 4px;
      background: var(--bg-light); border-radius: 10px;
      width: fit-content; margin-bottom: 28px;
    }
    .filter-tab {
      padding: 8px 18px; border: none; background: transparent;
      color: var(--text-muted); font-family: var(--font-body);
      font-weight: 600; font-size: 0.82rem; border-radius: 8px;
      cursor: pointer; transition: all 0.2s ease;
    }
    .filter-tab.active {
      background: #fff; color: var(--text-dark);
      box-shadow: 0 2px 8px rgba(25,28,29,0.06);
    }
    .filter-tab:hover:not(.active) { color: var(--text-dark); }

    /* Booking card */
    .booking-card {
      display: grid; grid-template-columns: 160px 1fr auto;
      gap: 24px; align-items: stretch;
      background: #fff; border-radius: var(--radius-xl);
      box-shadow: var(--shadow); overflow: hidden;
      transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
      margin-bottom: 18px;
    }
    .booking-card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-2px);
    }
    .booking-card-img {
      width: 100%; height: 100%; min-height: 180px;
      object-fit: cover;
    }
    .booking-card-body {
      padding: 22px 4px 22px 0;
      display: flex; flex-direction: column; justify-content: center;
    }
    .booking-card-actions {
      padding: 22px 24px 22px 0;
      display: flex; flex-direction: column;
      align-items: flex-end; justify-content: center; gap: 10px;
    }

    .booking-id {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.72rem; color: var(--text-muted);
      background: var(--bg-light); padding: 3px 10px;
      border-radius: 6px; display: inline-block;
      margin-bottom: 8px; letter-spacing: 0.5px;
    }
    .booking-room-name {
      font-family: var(--font-heading);
      font-size: 1.15rem; font-weight: 700;
      color: var(--text-dark); margin-bottom: 4px;
      letter-spacing: -0.01em;
    }
    .booking-location {
      font-size: 0.82rem; color: var(--text-muted);
      display: flex; align-items: center; gap: 4px;
      margin-bottom: 12px;
    }

    .booking-details-grid {
      display: grid; grid-template-columns: repeat(4, auto);
      gap: 20px;
    }
    .booking-detail-item {
      display: flex; flex-direction: column;
    }
    .booking-detail-item .detail-label {
      font-size: 0.68rem; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 1px;
      font-weight: 600; margin-bottom: 2px;
    }
    .booking-detail-item .detail-value {
      font-size: 0.88rem; font-weight: 600;
      color: var(--text-dark);
    }

    /* Status pill */
    .status-pill {
      padding: 5px 14px; border-radius: 50px;
      font-size: 0.72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .status-confirmed {
      background: rgba(0,104,96,0.1); color: #006860;
    }
    .status-cancelled {
      background: rgba(183,16,42,0.1); color: #b7102a;
    }
    .status-pending {
      background: rgba(202,138,4,0.1); color: #ca8a04;
    }
    .status-completed {
      background: rgba(37,99,235,0.1); color: #2563eb;
    }

    /* Price tag */
    .booking-price {
      font-family: var(--font-heading);
      font-size: 1.3rem; font-weight: 800;
      color: var(--text-dark); letter-spacing: -0.02em;
      text-align: right;
    }
    .booking-price .per-night {
      font-size: 0.72rem; font-weight: 500;
      color: var(--text-muted); display: block;
    }

    /* Cancel button */
    .btn-cancel {
      padding: 8px 18px; border: none;
      background: transparent; color: var(--text-muted);
      font-size: 0.8rem; font-weight: 600;
      border-radius: 8px; cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn-cancel:hover {
      background: #fef2f2; color: #b7102a;
    }

    /* Empty state */
    .empty-state {
      text-align: center; padding: 80px 24px;
    }
    .empty-icon {
      width: 80px; height: 80px; border-radius: 50%;
      background: var(--bg-light); display: flex;
      align-items: center; justify-content: center;
      margin: 0 auto 20px; font-size: 2rem;
    }
    .empty-state h2 {
      font-size: 1.4rem; font-weight: 700;
      margin-bottom: 8px;
    }
    .empty-state p {
      color: var(--text-muted); font-size: 0.92rem;
      max-width: 400px; margin: 0 auto 24px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .booking-card {
        grid-template-columns: 1fr;
      }
      .booking-card-img { min-height: 180px; max-height: 200px; }
      .booking-card-body { padding: 0 20px; }
      .booking-card-actions {
        padding: 0 20px 20px;
        flex-direction: row; align-items: center;
        justify-content: space-between;
      }
      .booking-details-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 14px;
      }
      .bookings-header-inner {
        flex-direction: column; align-items: flex-start;
      }
      .booking-price { text-align: left; }
    }

    /* Cancel modal */
    .cancel-modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(4px);
      display: none; align-items: center; justify-content: center;
      z-index: 2000; padding: 24px;
    }
    .cancel-modal-overlay.active { display: flex; }
    .cancel-modal {
      background: #fff; border-radius: var(--radius-xl);
      padding: 32px; max-width: 400px; width: 100%;
      box-shadow: var(--shadow-lg); text-align: center;
    }
    .cancel-modal h3 {
      font-size: 1.2rem; font-weight: 700;
      margin-bottom: 8px;
    }
    .cancel-modal p {
      color: var(--text-muted); font-size: 0.9rem;
      margin-bottom: 24px;
    }
    .cancel-modal-actions {
      display: flex; gap: 10px; justify-content: center;
    }
    .btn-confirm-cancel {
      padding: 10px 24px; border: none;
      background: #b7102a; color: #fff;
      font-weight: 600; font-size: 0.88rem;
      border-radius: 50px; cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn-confirm-cancel:hover {
      background: #92001c;
      box-shadow: 0 4px 16px rgba(183,16,42,0.25);
    }
    .btn-keep {
      padding: 10px 24px; border: none;
      background: var(--bg-light); color: var(--text-dark);
      font-weight: 600; font-size: 0.88rem;
      border-radius: 50px; cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn-keep:hover { background: var(--bg-surface-container); }
  </style>
</head>
<body>

<nav class="navbar" id="navbar"></nav>

<!-- Header with greeting -->
<header class="bookings-header">
  <div class="bookings-header-inner">
    <div class="greeting">
      <h1 id="greeting-text">My Bookings</h1>
      <p id="greeting-sub">Manage and track all your reservations</p>
    </div>
    <div class="booking-stats" id="booking-stats">
      <!-- filled by JS -->
    </div>
  </div>
</header>

<!-- Main Content -->
<section class="section" style="padding-top: 32px;">
  <div class="container">

    <!-- Filter Tabs -->
    <div class="filter-tabs" id="filter-tabs">
      <button class="filter-tab active" data-filter="all">All</button>
      <button class="filter-tab" data-filter="Confirmed">Upcoming</button>
      <button class="filter-tab" data-filter="Completed">Completed</button>
      <button class="filter-tab" data-filter="Cancelled">Cancelled</button>
    </div>

    <!-- Bookings List -->
    <div id="bookings-list">
      <div class="text-center py-12">
        <div class="spinner"></div>
        <p style="color:var(--text-muted);font-size:0.88rem;margin-top:12px;">Loading your bookings...</p>
      </div>
    </div>

  </div>
</section>

<!-- Cancel Confirmation Modal -->
<div class="cancel-modal-overlay" id="cancel-modal">
  <div class="cancel-modal">
    <div style="width:52px;height:52px;border-radius:50%;background:#fef2f2;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#b7102a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
    <h3>Cancel Booking?</h3>
    <p>Are you sure you want to cancel this reservation? This action cannot be undone.</p>
    <div class="cancel-modal-actions">
      <button class="btn-keep" id="btn-keep">Keep Booking</button>
      <button class="btn-confirm-cancel" id="btn-confirm-cancel">Yes, Cancel</button>
    </div>
  </div>
</div>

<footer class="footer" id="footer"></footer>

<script type="module" src="./js/presentation/pages/my-bookings.js"></script>

</body>
</html>
