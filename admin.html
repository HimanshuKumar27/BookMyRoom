<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Admin Dashboard — Manage rooms and bookings for BookMyRoom.">
  <title>Admin Dashboard — BookMyRoom</title>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/favicon-192.png">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@500;600;700&display=swap" media="print" onload="this.media='all'">
  <link rel="preload" href="css/tailwind.css?v=3" as="style">
  <link rel="stylesheet" href="css/tailwind.css?v=3">
</head>
<body>

<nav class="navbar" id="navbar"></nav>

<div class="admin-layout">
  <section class="section" style="padding-top:32px;">
    <div class="container">

      <!-- Header -->
      <div class="flex flex-wrap items-center justify-between gap-4 mb-8">
        <div>
          <h1 class="font-display text-2xl md:text-3xl">Admin <span style="color:var(--color-primary);">Dashboard</span></h1>
          <p class="text-gray-400 text-sm mt-1">Manage rooms, bookings, and monitor activity.</p>
        </div>
        <div class="flex gap-3">
          <button class="btn-primary btn-sm" id="btn-add-room">+ Add Room</button>
          <button class="btn-secondary btn-sm" id="btn-seed-data"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;margin-right:4px;"><path d="M12 19V5"/><path d="M5 12l7-7 7 7"/></svg> Seed Sample Data</button>
        </div>
      </div>

      <!-- stats -->
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8" id="stats-grid">
        <div class="glass-card p-5 text-center" style="transform:none;">
          <div class="text-2xl font-bold text-amber-400" id="stat-total-rooms">0</div>
          <div class="text-xs text-gray-400 mt-1">Total Rooms</div>
        </div>
        <div class="glass-card p-5 text-center" style="transform:none;">
          <div class="text-2xl font-bold text-green-400" id="stat-available">0</div>
          <div class="text-xs text-gray-400 mt-1">Available</div>
        </div>
        <div class="glass-card p-5 text-center" style="transform:none;">
          <div class="text-2xl font-bold text-red-400" id="stat-booked">0</div>
          <div class="text-xs text-gray-400 mt-1">Booked</div>
        </div>
        <div class="glass-card p-5 text-center" style="transform:none;">
          <div class="text-2xl font-bold text-blue-400" id="stat-bookings">0</div>
          <div class="text-xs text-gray-400 mt-1">Total Bookings</div>
        </div>
      </div>

      <!-- Tabs -->
      <div class="admin-tabs">
        <button class="admin-tab active" data-tab="rooms"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;margin-right:4px;"><path d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16"/><path d="M1 21h22"/><path d="M9 7h1"/><path d="M9 11h1"/><path d="M14 7h1"/><path d="M14 11h1"/><path d="M9 15h6v6H9z"/></svg> Rooms</button>
        <button class="admin-tab" data-tab="bookings"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;margin-right:4px;"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg> Bookings</button>
      </div>

      <!-- Rooms Tab -->
      <div id="tab-rooms">
        <div class="glass-card overflow-x-auto" style="transform:none;">
          <table class="data-table" id="rooms-table">
            <thead>
               <tr>
                 <th>Room Name</th>
                 <th>Type</th>
                 <th>City</th>
                 <th>Price/Night</th>
                 <th>Rating</th>
                 <th>Capacity</th>
                 <th>Status</th>
                 <th>Actions</th>
               </tr>
            </thead>
            <tbody id="rooms-tbody">
              <tr>
                <td colspan="7" class="text-center py-8 text-gray-400">
                  <div class="spinner" style="margin:8px auto;"></div>
                  Loading rooms...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Bookings Tab -->
      <div id="tab-bookings" class="hidden">
        <div class="glass-card overflow-x-auto" style="transform:none;">
          <table class="data-table" id="bookings-table">
            <thead>
              <tr>
                <th>Guest</th>
                <th>Room</th>
                <th>City</th>
                <th>Check-in</th>
                <th>Check-out</th>
                <th>Nights</th>
                <th>Total</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="bookings-tbody">
              <tr>
                <td colspan="8" class="text-center py-8 text-gray-400">
                  <div class="spinner" style="margin:8px auto;"></div>
                  Loading bookings...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </section>
</div>

<!-- ===== Add/Edit Room Modal ===== -->
<div class="modal-overlay" id="room-modal">
  <div class="glass-card modal" style="position:relative;transform:none;">
    <button class="modal-close" id="modal-close">&times;</button>
    <h2 id="modal-title" class="font-display">Add New Room</h2>

    <form id="room-form">
      <input type="hidden" id="room-id">
      <div class="form-group">
        <label for="room-name">Room Name *</label>
        <input type="text" id="room-name" class="form-control" placeholder="e.g. Royal Heritage Suite" required>
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div class="form-group">
          <label for="room-type">Room Type *</label>
          <select id="room-type" class="form-control" required>
            <option value="Single">Single</option>
            <option value="Double">Double</option>
            <option value="Suite">Suite</option>
            <option value="Deluxe">Deluxe</option>
          </select>
        </div>
        <div class="form-group">
          <label for="room-city">City *</label>
          <select id="room-city" class="form-control" required>
            <option value="Jaipur">Jaipur</option>
            <option value="Udaipur">Udaipur</option>
            <option value="Goa">Goa</option>
            <option value="Munnar">Munnar</option>
            <option value="Shimla">Shimla</option>
            <option value="Varanasi">Varanasi</option>
            <option value="Jodhpur">Jodhpur</option>
            <option value="Darjeeling">Darjeeling</option>
            <option value="Rishikesh">Rishikesh</option>
            <option value="Kochi">Kochi</option>
          </select>
        </div>
      </div>
       <div class="grid grid-cols-2 gap-4">
         <div class="form-group">
           <label for="room-price">Price per Night (₹) *</label>
           <input type="number" id="room-price" class="form-control" placeholder="e.g. 4500" min="500" required>
         </div>
         <div class="form-group">
           <label for="room-capacity">Capacity (guests) *</label>
           <input type="number" id="room-capacity" class="form-control" placeholder="e.g. 2" min="1" max="10" required>
         </div>
         <div class="form-group">
           <label for="room-rating">Rating (0-5)</label>
           <input type="number" id="room-rating" class="form-control" placeholder="4.5" min="0" max="5" step="0.1">
         </div>
         <div class="form-group">
           <label for="room-review-count">Review Count</label>
           <input type="number" id="room-review-count" class="form-control" placeholder="e.g. 128" min="0">
         </div>
       </div>
      <div class="form-group">
        <label for="room-status">Status</label>
        <select id="room-status" class="form-control">
          <option value="Available">Available</option>
          <option value="Booked">Booked</option>
        </select>
      </div>
      <div class="form-group">
        <label for="room-amenities">Amenities (comma-separated)</label>
        <input type="text" id="room-amenities" class="form-control" placeholder="e.g. WiFi, Pool, Breakfast">
      </div>
      <div class="form-group">
        <label for="room-description">Description</label>
        <textarea id="room-description" class="form-control" rows="3" placeholder="Describe this room..."></textarea>
      </div>
      <div class="form-group">
        <label for="room-images">Image URLs (comma-separated, optional)</label>
        <input type="text" id="room-images" class="form-control" placeholder="https://... , https://...">
      </div>
      <button type="submit" class="btn-primary mt-4" style="width:100%;" id="btn-save-room">Save Room</button>
    </form>
  </div>
</div>

<footer class="footer" id="footer"></footer>

<div id="form-errors"></div>

<script type="module" src="./js/presentation/pages/admin.js"></script>
</body>
</html>
