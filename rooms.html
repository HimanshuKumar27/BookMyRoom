<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse hotels and rooms across India. Filter by type, city, and availability. Best prices guaranteed.">
  <title>All Rooms - BookMyRoom</title>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/favicon-192.png">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@500;600;700&display=swap" media="print" onload="this.media='all'">
  <link rel="preload" href="css/tailwind.css?v=3" as="style">
  <link rel="stylesheet" href="css/tailwind.css?v=3">
</head>
<body>

<nav class="navbar" id="navbar"></nav>

<!-- Page Header -->
<div class="page-header">
  <span class="label block mb-4" style="color:var(--color-primary);letter-spacing:2px;font-size:0.8rem;font-weight:600;text-transform:uppercase;">Browse Rooms</span>
  <h1 class="font-display">Hotels & <span style="color:var(--color-primary)">Rooms</span></h1>
  <p>Find the best stays across India at great prices.</p>
</div>

<!-- 2-Column Layout Container -->
<section class="section" style="padding-top:32px;">
  <div class="container" style="padding:0 24px;">
    
    <div class="flex flex-col lg:flex-row gap-8">
      
      <!-- Left Sidebar (Filters) -->
      <aside class="w-full lg:w-1/4">
        <div class="glass-card sticky top-24 p-6 shadow-sm border border-gray-100 rounded-2xl">
          <h2 class="text-xl font-display font-semibold mb-6 flex justify-between items-center">
            Filters
            <button class="text-sm text-primary hover:text-primary-dark font-medium" id="btn-clear-filters">Clear All</button>
          </h2>
          
          <div class="space-y-6">
            <!-- Room Type -->
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Room Type</label>
              <select class="form-control w-full rounded-xl border-gray-200" id="filter-type">
                <option value="">All Room Types</option>
                <option value="Single">Single</option>
                <option value="Double">Double</option>
                <option value="Suite">Suite</option>
                <option value="Deluxe">Deluxe</option>
              </select>
            </div>
            
            <!-- City -->
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">City</label>
              <select class="form-control w-full rounded-xl border-gray-200" id="filter-city">
                <option value="">All Cities</option>
                <option value="Darjeeling">Darjeeling</option>
                <option value="Goa">Goa</option>
                <option value="Jaipur">Jaipur</option>
                <option value="Jaisalmer">Jaisalmer</option>
                <option value="Jodhpur">Jodhpur</option>
                <option value="Kochi">Kochi</option>
                <option value="Manali">Manali</option>
                <option value="Munnar">Munnar</option>
                <option value="Mysore">Mysore</option>
                <option value="Ooty">Ooty</option>
                <option value="Rishikesh">Rishikesh</option>
                <option value="Shimla">Shimla</option>
                <option value="Udaipur">Udaipur</option>
                <option value="Varanasi">Varanasi</option>
              </select>
            </div>

            <!-- Price Range -->
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Price Range</label>
              <select class="form-control w-full rounded-xl border-gray-200" id="filter-price">
                <option value="">All Prices</option>
                <option value="under_1000">Under ₹1,000</option>
                <option value="1000_1500">₹1,000 - ₹1,500</option>
                <option value="above_1500">Above ₹1,500</option>
              </select>
            </div>
            
            <!-- Status -->
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Availability</label>
              <select class="form-control w-full rounded-xl border-gray-200" id="filter-status">
                <option value="">All Status</option>
                <option value="Available">Available</option>
                <option value="Booked">Booked</option>
              </select>
            </div>
          </div>
        </div>
      </aside>

      <!-- Main Content (Room Listings) -->
      <main class="w-full lg:w-3/4">
        
        <!-- Results Header -->
        <div class="mb-6 flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
          <div>
            <h2 class="text-2xl font-display font-semibold text-gray-900" id="results-title">Available Rooms</h2>
            <p class="text-gray-500 text-sm mt-1" id="results-count">Showing results...</p>
          </div>
          <div class="flex items-center gap-3">
            <label class="text-sm font-medium text-gray-600">Sort by:</label>
            <select id="sort-by" class="form-control w-auto rounded-xl border-gray-200" onchange="handleSort()">
              <option value="recommended">Recommended</option>
              <option value="price_low">Price: Low to High</option>
              <option value="price_high">Price: High to Low</option>
              <option value="rating">Highest Rated</option>
              <option value="newest">Newest</option>
            </select>
          </div>
        </div>
        <!-- Active Filters Display -->
        <div id="active-filters" class="flex-wrap gap-2 mb-4 hidden">
          <!-- Populated by JS -->
        </div>

        <!-- Rooms List -->
        <div class="flex flex-col gap-6" id="rooms-grid">
          <!-- Room cards loaded dynamically -->
        </div>

        <!-- Loading State -->
        <div id="rooms-loading" class="bg-white rounded-2xl shadow-sm border border-gray-100 p-12 text-center">
          <div class="spinner mx-auto border-4 border-primary border-t-transparent rounded-full w-10 h-10 animate-spin"></div>
          <p class="text-gray-500 mt-4 font-medium">Searching for the best stays...</p>
        </div>
      
        <!-- Empty State -->
        <div id="rooms-empty" class="bg-white rounded-2xl shadow-sm border border-gray-100 p-16 text-center hidden">
          <div class="text-gray-300 mb-4 flex justify-center">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
              <path d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16"/>
              <path d="M1 21h22"/>
              <path d="M9 7h1"/>
              <path d="M9 11h1"/>
              <path d="M14 7h1"/>
              <path d="M14 11h1"/>
              <path d="M9 15h6v6H9z"/>
            </svg>
          </div>
          <h3 class="font-display text-xl font-semibold mb-2 text-gray-900">No rooms found</h3>
          <p class="text-gray-500">Try adjusting your filters or search in a different city.</p>
          <button class="mt-6 px-6 py-2 bg-primary/10 text-primary hover:bg-primary hover:text-white rounded-full transition-colors font-medium" onclick="document.getElementById('btn-clear-filters').click()">Clear Filters</button>
        </div>
      </main>
      
    <!-- Compare Bar (floating) -->
    <div id="compare-bar" class="compare-bar">
      <div class="flex items-center">
        <span class="compare-bar-title">
          Compare <span id="compare-count" class="compare-bar-count">0</span> rooms
        </span>
        <button class="compare-bar-clear ml-4" onclick="clearCompare()">Clear all</button>
      </div>
      <button class="compare-bar-btn" onclick="openCompareModal()">Compare Now</button>
    </div>

    <!-- Compare Modal -->
    <div class="modal-overlay" id="compare-modal" onclick="if(event.target === this) closeCompareModal()">
      <div class="modal compare-modal">
        <button class="modal-close" onclick="closeCompareModal()">&times;</button>
        <h2 class="font-display">Compare Rooms</h2>
        <div id="compare-content" class="grid gap-6">
          <!-- Populated by JS -->
        </div>
      </div>
    </div>
    
    </div>
  </div>
</section>

<footer class="footer mt-12" id="footer"></footer>

<script type="module" src="./js/presentation/pages/rooms.js"></script>

</body>
</html>
