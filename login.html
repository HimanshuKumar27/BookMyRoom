<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login to your BookMyRoom account to manage bookings.">
  <title>Login — BookMyRoom</title>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/favicon-192.png">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@500;600;700&display=swap" media="print" onload="this.media='all'">
  <link rel="preload" href="css/tailwind.css?v=3" as="style">
  <link rel="stylesheet" href="css/tailwind.css?v=3">
</head>
<body>

<nav class="navbar" id="navbar"></nav>

<div class="auth-container">
  <div class="glass-card auth-card">
    <div class="text-center mb-2">
      <img src="assets/apple-touch-icon.png" alt="Book My Room Icon" width="48" height="48" style="display:inline-block;border-radius:10px;">
    </div>
    <h1>Welcome Back</h1>
    <p class="subtitle">Sign in to your BookMyRoom account</p>

    <form id="login-form">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <div style="position:relative;">
          <input type="password" id="password" class="form-control" placeholder="Enter your password" required style="padding-right:44px;">
          <button type="button" class="password-toggle" onclick="togglePassword('password', this)" aria-label="Toggle password visibility" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#9ca3af;padding:4px;display:flex;align-items:center;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
        </div>
      </div>
      <div class="flex justify-between items-center mb-6">
        <label class="flex items-center gap-2 text-sm text-gray-400 cursor-pointer">
          <input type="checkbox" id="remember-me" class="rounded" style="accent-color:var(--color-primary);">
          Remember me
        </label>
        <a href="#" class="text-sm" style="color:var(--color-primary);">Forgot password?</a>
      </div>
      <button type="submit" class="btn-primary w-full" id="btn-login" style="width:100%;">
        Login
      </button>
    </form>

    <div id="login-error" class="mt-4 text-center text-sm hidden" style="color:#f87171;"></div>

    <p class="auth-footer">
      Don't have an account? <a href="register.html">Create one →</a>
    </p>
  </div>
</div>

<div id="form-errors"></div>

<script>
  function togglePassword(fieldId, btn) {
    const input = document.getElementById(fieldId);
    if (input.type === 'password') {
      input.type = 'text';
      btn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
    } else {
      input.type = 'password';
      btn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
    }
  }
</script>

<script type="module">
  import { renderNavbar, showToast } from './js/utils.js?v=2';
  import { supabase } from './js/supabase-config.js';
  import { rateLimiters, validateForm, sanitize, showFormErrors, getAuthRedirect } from './js/security.js';

  renderNavbar('');

  const form = document.getElementById('login-form');
  const errorDiv = document.getElementById('login-error');
  const btnLogin = document.getElementById('btn-login');
  const rememberMe = document.getElementById('remember-me');
  const emailInput = document.getElementById('email');

  // Restore remembered email
  const savedEmail = localStorage.getItem('brm_remembered_email');
  if (savedEmail) {
    emailInput.value = savedEmail;
    rememberMe.checked = true;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = sanitize(document.getElementById('email').value);
    const password = document.getElementById('password').value;

    // --- Input Validation ---
    const validation = validateForm({
      'Email': { value: email, rules: ['required', 'email'] },
      'Password': { value: password, rules: ['required'] }
    });

    if (!validation.valid) {
      showFormErrors(validation.errors, 'form-errors');
      return;
    }
    showFormErrors([], 'form-errors');

    // --- Rate Limiting ---
    const rateCheck = rateLimiters.login.check();
    if (!rateCheck.allowed) {
      const waitSec = rateLimiters.login.getRemainingTime();
      errorDiv.textContent = `Too many login attempts. Please try again in ${waitSec} seconds.`;
      errorDiv.classList.remove('hidden');
      return;
    }

    btnLogin.disabled = true;
    btnLogin.textContent = 'Logging In...';
    errorDiv.classList.add('hidden');

    try {
      const { data, error } = await supabase.auth.signInWithPassword({
        email,
        password
      });

      if (error) throw error;

      rateLimiters.login.reset();

      // Remember me: save or clear email
      if (rememberMe.checked) {
        localStorage.setItem('brm_remembered_email', email);
      } else {
        localStorage.removeItem('brm_remembered_email');
      }

      showToast('Welcome back! Redirecting...', 'success');

      const redirect = getAuthRedirect() || 'index.html';
      setTimeout(() => { window.location.href = redirect; }, 1000);
    } catch (error) {
      let msg = 'Login failed. Please try again.';
      if (error.message?.includes('Invalid login credentials')) msg = 'Invalid email or password.';
      else if (error.message?.includes('Email not confirmed')) msg = 'Please confirm your email address first.';
      errorDiv.textContent = msg;
      errorDiv.classList.remove('hidden');
      btnLogin.disabled = false;
      btnLogin.textContent = 'Login';
    }
  });
</script>

</body>
</html>
